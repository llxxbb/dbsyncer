<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div th:fragment="content">
    <!-- 数据源表数据 -->
    <script type="application/json" id="sourceTableData" th:utext="${mapping?.sourceConnector?.table} ? ${#strings.replace(#strings.replace(#strings.toString(mapping?.sourceConnector?.table), '[', '['), ']', ']')}"></script>

    <div class="row">
        <!-- 数据源配置 -->
        <div class="col-md-5">
            <label class="col-sm-3 control-label text-right">数据源表</label>
            <div class="col-sm-9">
                <button type="button" class="btn btn-default" id="sourceTableBtn">
                    <i class="fa fa-table"></i>
                    <span id="sourceTableText">选择表</span>
                    <span class="badge" id="sourceTableCount" style="display: none;">0</span>
                </button>
                <!-- 隐藏字段存储选中值，保持向后兼容 -->
                <select id="sourceTable" class="form-control select-control-table hidden" multiple="multiple">
                    <option th:each="t,s:${mapping?.sourceConnector?.table}" th:text="${t?.name} + ' ('+${t?.type}+')'"
                            th:value="${t?.name}"/>
                </select>
            </div>
        </div>
        <!-- 中间图标 -->
        <div class="col-md-2 text-center">
            <span class="fa fa-angle-double-right fa-2x"></span>
        </div>
        <!-- 目标源配置 -->
        <div class="col-md-5">
            <div class="form-group">
                <label class="col-sm-3 control-label text-right">目标源表</label>
                <div class="col-sm-9">
                    <button type="button" class="btn btn-default" id="targetTableBtn">
                        <i class="fa fa-table"></i>
                        <span id="targetTableText">选择表</span>
                        <span class="badge" id="targetTableCount" style="display: none;">0</span>
                    </button>
                    <!-- 隐藏字段存储选中值，保持向后兼容 -->
                    <select id="targetTable" class="form-control select-control-table hidden" multiple="multiple">
                        <option th:each="t,s:${mapping?.targetConnector?.table}"
                                th:text="${t?.name} + ' ('+${t?.type}+')'" th:value="${t?.name}"/>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <!-- 数据源配置 -->
        <div class="col-md-5">
            <label class="col-sm-3 control-label text-right">标记主键<i class="fa fa-question-circle fa_gray" aria-hidden="true" title="数据源表/视图没有主键，自定义一个或多个主键"></i></label>
            <div class="col-sm-9">
                <input id="sourceTablePK" class="form-control" type="text" data-role="tagsinput"/>
            </div>
        </div>
        <!-- 中间图标 -->
        <div class="col-md-2 text-center">
            <span class="fa fa-angle-double-right fa-2x"></span>
        </div>
        <!-- 目标源配置 -->
        <div class="col-md-5">
            <div class="form-group">
                <label class="col-sm-3 control-label text-right">标记主键<i class="fa fa-question-circle fa_gray" aria-hidden="true" title="目标源表/视图没有主键，自定义一个或多个主键"></i></label>
                <div class="col-sm-9">
                    <input id="targetTablePK" class="form-control" type="text" data-role="tagsinput" />
                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <div class="row">
            <div class="col-md-2">&nbsp;
                <button id="refreshTableBtn" type="button" class="btn btn-default" th:title="刷新数据源和目标源表" th:tableGroupId="${mapping?.id}">
                    <span class="fa fa-refresh"></span>刷新表
                </button>
            </div>
            <div class="col-md-6"></div>
            <div class="col-md-4 text-right">
                <button id="batchConvertConfigBtn" th:if="${currentUser?.roleCode eq 'admin'}" th:mappingId="${mapping?.id}" th:data-connector-type="${mapping?.targetConnector?.config?.connectorType}" type="button" class="btn btn-info" disabled="disabled">
                    <span class="fa fa-magic"></span>批量转换配置
                </button>
                <button id="tableGroupResyncBtn" th:mappingId="${mapping?.id}" type="button" class="btn btn-warning" disabled="disabled">
                    <span class="fa fa-refresh"></span>重新同步
                </button>
                <button id="tableGroupDelBtn" th:mappingId="${mapping?.id}" type="button" class="btn btn-default" disabled="disabled">
                    <span class="fa fa-remove"></span>删除
                </button>
                <button id="tableGroupAddBtn" th:mappingId="${mapping?.id}" type="button" class="btn btn-primary">
                    <span class="fa fa-plus"></span>添加
                </button>&nbsp;
            </div>
        </div>
    </div>

    <div class="form-group">
        <table th:if="${tableGroups.size() gt 0}" class="table table-hover">
            <thead>
            <tr>
                <th>数据源表</th>
                <th>目标源表</th>
                <th>字段差异</th>
                <th style="white-space: nowrap;"><input type="checkbox" class="tableGroupCheckboxAll" /> <span id="tableGroupCheckCount" class="text-muted" style="font-weight: normal; font-size: 12px; display: inline-block; min-width: 50px;"></span></th>
            </tr>
            </thead>
            <tbody id="tableGroupList">
                <tr th:id="${t?.id}" title='点击编辑' class='dbsyncer_pointer' th:each="t,state : ${tableGroups}">
                    <td th:text="${t?.sourceTable.name}"/>
                    <td>
                        <span class="target-table-name" th:text="${t?.targetTable.name}"></span>
                        <i class="fa fa-edit well-sign-green dbsyncer_pointer target-table-rename"
                           th:data-id="${t?.id}"
                           th:data-current-name="${t?.targetTable.name}"
                           th:data-target-table-pk="${t?.targetTablePK}"
                           title="重命名目标表"
                           style="margin-left: 8px;"></i>
                    </td>
                    <td class="field-diff-status" th:data-id="${t?.id}" style="cursor: pointer;">
                        <span class="label label-default">检测中...</span>
                    </td>
                    <td><input th:value="${t?.id}" th:mappingId="${mapping?.id}" type="checkbox" class="tableGroupCheckbox" /></td>
                </tr>
            </tbody>
        </table>
        <input id="sortedTableGroupIds" name="sortedTableGroupIds" type="hidden" />
    </div>

    <!-- 字段差异详情弹窗 -->
    <div class="modal fade" id="fieldDifferenceModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                    <h4 class="modal-title">字段差异分析</h4>
                </div>
                <div class="modal-body">
                    <div id="fieldDifferenceContent">
                        <!-- 动态生成 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 批量转换配置弹窗 -->
    <div class="modal fade" id="batchConvertConfigModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                    <h4 class="modal-title">批量添加转换配置</h4>
                </div>
                <div class="modal-body">
                    <div class="alert alert-info">
                        <i class="fa fa-info-circle"></i> 为选中的表组批量添加转换配置。系统将自动检查目标表中的字段：
                        <ul style="margin-top: 5px; margin-bottom: 0;">
                            <li>若字段已存在 → 直接使用该字段（忽略您输入的字段类型）</li>
                            <li>若字段不存在 → 按您输入的类型创建新字段</li>
                        </ul>
                    </div>
                    
                    <!-- 转换配置表单 - 简化版 -->
                    <div class="form-horizontal">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">目标字段名称</label>
                            <div class="col-sm-9">
                                <input id="batchConvertTargetField" type="text" class="form-control" 
                                       placeholder="请输入字段名称（如：sync_flag、status）">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="col-sm-3 control-label">字段类型</label>
                            <div class="col-sm-9">
                                <select id="batchConvertFieldType" class="form-control select-control" data-live-search="true">
                                    <!-- 字段类型由JavaScript动态填充 -->
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="col-sm-3 control-label">长度</label>
                            <div class="col-sm-9">
                                <input id="batchConvertFieldSize" type="text" class="form-control" 
                                       placeholder="请输入字段长度（如：255）">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="col-sm-3 control-label">精度</label>
                            <div class="col-sm-9">
                                <input id="batchConvertFieldScale" type="text" class="form-control" 
                                       placeholder="请输入精度（如：2）">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="col-sm-3 control-label"></label>
                            <div class="col-sm-9">
                                <div class="checkbox">
                                    <label>
                                        <input type="checkbox" id="batchConvertFieldNullable" checked>
                                        允许空值
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="col-sm-3 control-label">备注</label>
                            <div class="col-sm-9">
                                <textarea id="batchConvertFieldComment" class="form-control" rows="2" 
                                          placeholder="请输入字段备注"></textarea>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <div class="form-group">
                            <label class="col-sm-3 control-label">转换类型</label>
                            <div class="col-sm-9">
                                <select id="batchConvertType" class="form-control select-control">
                                    <option th:value="${c?.code}" 
                                            th:text="${c?.name}" 
                                            th:argNum="${c?.argNum}"
                                            th:title="${c?.name + '：' + c?.description}"
                                            th:each="c,state : ${convert}"/>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group" id="batchConvertArgsGroup">
                            <label class="col-sm-3 control-label">参数值</label>
                            <div class="col-sm-9">
                                <input id="batchConvertArgs" type="text" class="form-control" 
                                       placeholder="请输入参数值（如：0、BATCH_001、${field1}等）">
                            </div>
                        </div>
                        
                        <div class="alert alert-success">
                            <i class="fa fa-check-circle"></i> 将应用到已选中的 <strong><span id="selectedCount">0</span></strong> 个映射关系
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="batchConvertSubmitBtn">
                        <span class="fa fa-check"></span>确认应用
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 字段编辑对话框 -->
    <div th:replace="field-edit-dialog :: fieldEditDialog"></div>
</div>

</html>

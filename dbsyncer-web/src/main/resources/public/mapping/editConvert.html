<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div th:fragment="content">
    <p class="text-muted">
        转换配置
        <i class="fa fa-question-circle" id="convertHelpIcon" style="cursor: pointer; margin-left: 5px; color: #5bc0de;" title="点击查看帮助"></i>
    </p>

    <!-- 隐藏的转换类型数据容器（供 JavaScript 使用） -->
    <table id="convertHelpData" class="hidden">
        <tbody>
            <tr th:each="c : ${convert}">
                <td class="convert-code" th:text="${c?.code}"></td>
                <td class="convert-name" th:text="${c?.name}"></td>
                <td class="convert-argNum" th:text="${c?.argNum == -1 ? '-' : c?.argNum}"></td>
                <td class="convert-description" th:text="${c?.description}"></td>
                <td class="convert-example" th:utext="${c?.example}"></td>
            </tr>
        </tbody>
    </table>

    <div class="form-group">
        <div class="row">
            <div class="col-md-4">
                <label class="col-sm-3 control-label text-right">类型</label>
                <div class="col-sm-9">
                    <select id="convertOperator" class="form-control select-control">
                        <option th:value="${c?.code}" 
                                th:text="${c?.name}" 
                                th:argNum="${c?.argNum}"
                                th:title="${c?.name + '：' + c?.description}"
                                th:each="c,state : ${convert}"/>
                    </select>
                </div>
            </div>
            <div class="col-md-4">
                <label class="col-sm-3 control-label text-right">目标源表字段</label>
                <div class="col-sm-9">
                    <div class="input-group">
                        <select id="convertTargetField" class="form-control select-control" data-live-search="true">
                            <!-- 目标源表公共字段 -->
                            <option th:if="${tableGroup} == null" th:each="c,s:${mapping?.targetColumn}" th:value="${c?.name}" th:text="${c?.name} +' (' + ${c?.typeName} +')'" />

                            <!-- 目标源表字段 -->
                            <option th:each="c,s:${tableGroup?.targetTable?.column}" th:value="${c?.name}" th:text="${c?.name} +' (' + ${c?.typeName} +')'" />
                        </select>
                        <span class="input-group-btn">
                            <button type="button" class="btn btn-default" id="addTargetFieldBtn" title="添加新字段">
                                <span class="fa fa-plus"></span>
                            </button>
                        </span>
                    </div>
                </div>
            </div>
            <div class="col-md-4" id="convertParamsGroup">
                <label class="col-sm-2 control-label text-right">参数</label>
                <div class="col-sm-10">
                    <!-- 统一的参数输入容器，根据 argNum 动态显示 -->
                    <div id="convertParamsContainer">
                        <!-- argNum == -1 时显示：表达式/固定值输入框（单行，全宽） -->
                        <div class="col-sm-12" style="padding: 0; display: none;" data-arg-num="-1">
                            <input class="form-control convertParam" type="text" placeholder="表达式或固定值（如：${field1} + ' ' + ${field2} 或 BATCH_001）" />
                        </div>
                        <!-- argNum >= 1 时显示：参数输入框（最多2个，并排） -->
                        <div class="col-sm-6" style="padding-left: 0; display: none;" data-arg-num="1">
                            <input class="form-control convertParam" type="text" maxlength="50" placeholder="参数1" />
                        </div>
                        <div class="col-sm-6" style="padding-right: 0; display: none;" data-arg-num="2">
                            <input class="form-control convertParam" type="text" maxlength="50" placeholder="参数2" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <div class="row">
            <div class="col-md-11"></div>
            <div class="col-md-1">
                <button id="convertAdd" type="button" class="btn btn-primary">
                    <span class="fa fa-plus"></span>添加
                </button>
            </div>
        </div>
    </div>

    <div class="form-group">
        <div class="row">
            <div class="col-md-1"></div>
            <div class="col-md-11">
                <table id="convertTable" class="table table-hover hidden">
                    <thead>
                        <tr>
                            <th>类型</th>
                            <th>目标源表字段</th>
                            <th>参数/表达式</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="convertList">
                        <!-- Mapping convert -->
                        <tr th:if="${tableGroup} == null" th:each="f,s:${mapping?.convert}" th:data-id="${f?.id}" th:data-isroot="${f?.root}">
                            <td th:value="${f?.convertCode}">[[${f?.convertName}]]</td>
                            <td>[[${f?.name}]]</td>
                            <td th:text="${f?.args}"></td>
                            <td><a class='fa fa-remove fa-2x convertDelete dbsyncer_pointer' title='删除' ></a></td>
                        </tr>
                        <!-- TableGroup convert -->
                        <tr th:each="f,s:${tableGroup?.convert}" th:data-id="${f?.id}" th:data-isroot="${f?.root}">
                            <td th:value="${f?.convertCode}">[[${f?.convertName}]]</td>
                            <td>[[${f?.name}]]</td>
                            <td th:text="${f?.args}"></td>
                            <td><a class='fa fa-remove fa-2x convertDelete dbsyncer_pointer' title='删除' ></a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 隐藏表单值 -->
    <!-- 隐藏表单值 -->
    <div class="form-group hidden">
        <input id="convert" name="convert" class="form-control" type="text"/>
    </div>

    <!-- 字段编辑对话框 -->
    <div id="fieldEditDialog" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title">编辑字段信息</h4>
                </div>
                <div class="modal-body">
                    <form id="fieldEditForm" class="form-horizontal">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">字段名称</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="fieldName" placeholder="字段名" required/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">字段类型</label>
                            <div class="col-sm-9">
                                <select id="fieldType" class="form-control selectpicker" data-live-search="true">
                                    <option value="">请选择</option>
                                    <option value="VARCHAR">VARCHAR - 可变长度字符串</option>
                                    <option value="CHAR">CHAR - 固定长度字符串</option>
                                    <option value="INT">INT - 整数</option>
                                    <option value="BIGINT">BIGINT - 长整数</option>
                                    <option value="DECIMAL">DECIMAL - 高精度数字</option>
                                    <option value="FLOAT">FLOAT - 浮点数</option>
                                    <option value="DOUBLE">DOUBLE - 双精度浮点数</option>
                                    <option value="DATE">DATE - 日期</option>
                                    <option value="TIME">TIME - 时间</option>
                                    <option value="TIMESTAMP">TIMESTAMP - 时间戳</option>
                                    <option value="BOOLEAN">BOOLEAN - 布尔值</option>
                                    <option value="TEXT">TEXT - 长文本</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" id="fieldSizeGroup" style="display:none;">
                            <label class="col-sm-3 control-label">长度</label>
                            <div class="col-sm-9">
                                <input type="number" class="form-control" id="fieldSize" placeholder="长度" min="1" max="65535"/>
                            </div>
                        </div>
                        <div class="form-group" id="fieldScaleGroup" style="display:none;">
                            <label class="col-sm-3 control-label">精度</label>
                            <div class="col-sm-9">
                                <input type="number" class="form-control" id="fieldScale" placeholder="小数位数" min="0" max="30"/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">允许为空</label>
                            <div class="col-sm-9">
                                <label class="checkbox-inline">
                                    <input type="checkbox" id="fieldNullable" checked/> 是
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">字段注释</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="fieldComment" placeholder="注释"/>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmFieldEdit">确定</button>
                </div>
            </div>
        </div>
    </div>

</div>
</html>
        <input id="convert" name="convert" class="form-control" type="text"/>
    </div>

</div>
</html>

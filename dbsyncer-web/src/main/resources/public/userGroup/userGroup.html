<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="container">
    <form class="form-horizontal" role="form">
        <div class="row text-center">
            <div class="page-header">
                <h3>用户组管理</h3>
            </div>
        </div>

        <!-- 管理员操作区域 -->
        <div class="form-group">
            <div class="row">
                <div class="col-sm-10"></div>
                <div class="col-md-2 text-right">
                    <button id="addUserGroupBtn" type="button" class="btn btn-primary">
                        <span class="fa fa-plus"></span>添加用户组([[${userGroups?.size()} ?: 0]])
                    </button>
                </div>
            </div>
        </div>

        <!-- 用户组列表 -->
        <div class="row">
            <div class="col-md-12">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>用户组名称</th>
                        <th>描述</th>
                        <th>用户数</th>
                        <th>任务分组数</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="userGroupList">
                    <tr th:each="ug,state : ${userGroups}">
                        <td th:text="${ug?.name}"/>
                        <td th:text="${ug?.description}"/>
                        <td>
                            <span class="label label-info" th:text="${ug?.userIds?.size() ?: 0}"></span>
                        </td>
                        <td>
                            <span class="label label-success" th:text="${ug?.projectGroupIds?.size() ?: 0}"></span>
                        </td>
                        <td>
                            <button type="button" th:id="${ug?.id}" class="btn btn-primary editUserGroupBtn">
                                <span class="fa fa-pencil"></span>修改
                            </button>
                            <button type="button" th:id="${ug?.id}" class="btn btn-default removeUserGroupBtn">
                                <span class="fa fa-times"></span>删除
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </form>
</div>

<script th:src="@{/js/userGroup/index.js}"></script>
</html>
